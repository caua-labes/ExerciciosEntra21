<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Naval</title>
    <style>
        .acert {
            background-color: greenyellow;
        }

        .err {
            background-color: red;
        }

        .cant {
            display: flex;
            position: fixed;
            margin: 10px;
        }

        #mapa {
            display: inline-flex;
            flex-wrap: wrap;
            margin: 100px;
            justify-content: center;
            align-items: center;
        }

        p {
            border: solid rgb(0, 0, 255);
            padding: 15px;
            text-align: center;
            width: 20px;
            height: 20px;
            margin: 0%;
            cursor: pointer;
            color: rgb(0, 84, 180);
            font-family: monospace;
            font-size: 20px;
        }

        #contador {
            background-color: cornflowerblue;
        }
    </style>
</head>

<body>
    <div class="cant">
        <button onclick="facil()">Facil</button>
        <button onclick="medio()">Medio</button>
        <button onclick="dificil()">Dificil</button>
        <p id="contador"></p>
    </div>
    <div id="mapa">

    </div>

</body>
<script>
    var n1 = 0
    var n2 = 0
    var n3 = 0
    var nivel = false
    var contad = 0

    function facil() {
        if (nivel == false) {
            n1 = parseInt(Math.random() * (9 - 0) + 0)
            n2 = parseInt(Math.random() * (9 - 0) + 9)
            n3 = parseInt(Math.random() * (9 - 0) + 17)
            for (let i = 0 + 1 ; i <= 25; i++) {
                document.getElementById("mapa").innerHTML += `<p onclick="get(${i})">~</p>`
            }
            nivel = true
        }
    }
    function medio() {
        if (nivel == false) {
            for (let i = 0 + 1; i < 50; i++) {
                document.getElementById("mapa").innerHTML += `<p onclick="get(${i})">~</p>`
            }
            nivel = true
        }
    }
    function dificil() {
        if (nivel == false) {
            for (let i = 0 + 1; i < 75; i++) {
                document.getElementById("mapa").innerHTML += `<p onclick="get(${i})">~</p>`
            }
            nivel = true
        }
    }
    function get(item) {

        if (item == n1) {
            document.getElementsByTagName("p")[item].innerHTML = "O"
            alert("acertou o 1")
            return;
        }
        if (item == n2) {
            document.getElementsByTagName("p")[item].innerHTML = "O"
            alert("acertou o 2")
            return;
        }
        if (item == n3) {
            document.getElementsByTagName("p")[item].innerHTML = "O"
            alert("acertou o 3")
            return;
        }
        contad += 1
        console.log(item)
        document.getElementById("contador").innerHTML = contad
        document.getElementsByTagName("p")[item].innerHTML = "X"

    }
</script>

</html>

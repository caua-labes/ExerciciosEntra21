<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista</title>
</head>
<body>
    <input type="text" id="valor" placeholder="Valor">
    <button onclick="listar()">Listar</button>
    <div id="lista">

    </div>
</body>
<script>
    var contador = 0
    var pot = 0
    function listar(){
        var valor = document.getElementById("valor").value
        contador += 1
        document.getElementById("lista").innerHTML += `<span>${valor}<button onclick="del(${contador})">X</button></span>`
    }
    function del(item){
        item = item - 1
        document.getElementsByTagName("span")[item].innerHTML = ""
        
    }
</script>
</html>
